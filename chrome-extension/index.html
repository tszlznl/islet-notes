<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Islet</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      #root:empty {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #f6f5f2;
      }

      #root:empty::before {
        content: '';
        width: 32px;
        height: 32px;
        border: 2px solid rgba(40, 44, 52, 0.16);
        border-top-color: #2f8c76;
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../src/main.tsx"></script>
  </body>
</html>
